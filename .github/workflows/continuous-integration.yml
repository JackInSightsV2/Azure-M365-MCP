name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Validate installed dependencies
        run: python -m pip check

      - name: Check formatting
        run: black --check unified_mcp tests

      - name: Lint
        run: ruff check unified_mcp tests

      - name: Type check
        run: mypy unified_mcp

      - name: Run tests
        run: pytest -m "not docker" --cov=unified_mcp --cov-report=term-missing

  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-24.04
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Build Docker image
        run: docker build -t unified-microsoft-mcp:latest .
