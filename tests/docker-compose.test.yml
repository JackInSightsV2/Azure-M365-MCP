services:
  # 1. MCP over Streamable HTTP
  mcp-http:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: mcp-test-http
    ports:
      - "127.0.0.1:18080:8000"
    environment:
      - MCP_TRANSPORT=streamable-http
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
      - LOG_LEVEL=DEBUG
      - MOCK_MODE=true
      - MCP_API_KEY=contract-test-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 2. OpenAPI Mode - REST API
  mcp-openapi:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: mcp-test-openapi
    ports:
      - "127.0.0.1:18081:8001"
    environment:
      - MCP_TRANSPORT=openapi
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8001
      - LOG_LEVEL=DEBUG
      - MOCK_MODE=true
      - MCP_API_KEY=contract-test-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Stdio Mode - Interactive Stream (Kept alive with -i)
  mcp-stdio:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: mcp-test-stdio
    stdin_open: true # Equivalent to -i
    tty: true        # Equivalent to -t
    environment:
      - MCP_TRANSPORT=stdio
      - LOG_LEVEL=DEBUG
      - MOCK_MODE=true

  # 4. Legacy MCP over SSE
  mcp-sse:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: mcp-test-sse
    ports:
      - "127.0.0.1:18082:8002"
    environment:
      - MCP_TRANSPORT=sse
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8002
      - LOG_LEVEL=DEBUG
      - MOCK_MODE=true
      - MCP_API_KEY=contract-test-key
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
