services:
  unified-microsoft-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: unified-microsoft-mcp
    environment:
      # General settings
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FILE=/tmp/logs/unified_mcp.log
      
      # MCP Transport settings
      # Set MCP_TRANSPORT=streamable-http to enable the recommended HTTP mode
      # Note: MCP_PORT is set to 8001 in Dockerfile; port mapping handles host port customization
      - MCP_TRANSPORT=${MCP_TRANSPORT:-stdio}
      - MCP_HOST=0.0.0.0
      - MCP_API_KEY=${MCP_API_KEY:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://127.0.0.1:8001,http://localhost:8001}
      - EXECUTION_POLICY=${EXECUTION_POLICY:-unrestricted}
      - AZURE_COMMAND_ALLOWLIST=${AZURE_COMMAND_ALLOWLIST:-}
      - GRAPH_REQUEST_ALLOWLIST=${GRAPH_REQUEST_ALLOWLIST:-}

      # ========================================================================
      # AUTHENTICATION CREDENTIALS
      # Use managed identity in Azure, or service-principal credentials for
      # non-interactive HTTP deployments.
      # ========================================================================
      
      # Azure CLI Service Principal (Required for HTTP)
      - AZURE_APP_TENANT_ID=${AZURE_APP_TENANT_ID:-}
      - AZURE_APP_CLIENT_ID=${AZURE_APP_CLIENT_ID:-}
      - AZURE_APP_CLIENT_SECRET=${AZURE_APP_CLIENT_SECRET:-}
      - AZURE_SUBSCRIPTION_ID=${AZURE_SUBSCRIPTION_ID:-}
      
      # Shared App Registration (uses Azure CLI creds for Graph API)
      - SHARE_APP_REGISTRATION=${SHARE_APP_REGISTRATION:-false}
      - USE_MANAGED_IDENTITY=${USE_MANAGED_IDENTITY:-false}
      - MANAGED_IDENTITY_CLIENT_ID=${MANAGED_IDENTITY_CLIENT_ID:-}
      
      # Microsoft Graph App Registration (Required for HTTP)
      - GRAPH_APP_CLIENT_ID=${GRAPH_APP_CLIENT_ID:-${CUSTOM_CLIENT_ID:-}}
      - GRAPH_APP_TENANT_ID=${GRAPH_APP_TENANT_ID:-${CUSTOM_TENANT_ID:-}}
      - GRAPH_APP_CLIENT_SECRET=${GRAPH_APP_CLIENT_SECRET:-${CLIENT_SECRET:-}}
      
      # Legacy/Alternative settings
      - CUSTOM_CLIENT_ID=${CUSTOM_CLIENT_ID:-}
      - CUSTOM_TENANT_ID=${CUSTOM_TENANT_ID:-}
      - CLIENT_SECRET=${CLIENT_SECRET:-}
      - USE_APP_REG_CLIENTID=${USE_APP_REG_CLIENTID:-}
      - TENANTID=${TENANTID:-}
      - GRAPH_CLIENT_SECRET=${GRAPH_CLIENT_SECRET:-}
      
      # Timeout settings
      - COMMAND_TIMEOUT=${COMMAND_TIMEOUT:-300}
      - OPERATION_TIMEOUT=${OPERATION_TIMEOUT:-300}
      - MAX_CONCURRENT_COMMANDS=${MAX_CONCURRENT_COMMANDS:-5}
      - MAX_CONCURRENT_OPERATIONS=${MAX_CONCURRENT_OPERATIONS:-5}
    
    ports:
      - "127.0.0.1:${MCP_PORT:-8001}:8001"

    volumes:
      # Mount logs directory for persistent logging
      - ./logs:/tmp/logs
      
      # Mount Azure CLI config directory for persistent authentication
      - azure-cli-config:/home/app/.azure
    
    # MCP uses stdio, so we need to keep the container running
    # and interact with it via stdin/stdout
    stdin_open: true
    tty: true
    
    # Restart policy
    restart: unless-stopped
    
    # Health check (optional)
    healthcheck:
      test: ["CMD-SHELL", "if [ \"$${MCP_TRANSPORT}\" = \"stdio\" ]; then python -c \"import unified_mcp\"; else curl --fail --silent http://127.0.0.1:8001/health >/dev/null; fi"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M

volumes:
  # Persistent volume for Azure CLI configuration
  azure-cli-config:
    driver: local

networks:
  default:
    name: unified-mcp-network
